name: factory-system

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - factory-postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-https://mirrors.tencent.com/alpine}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_ORIGIN: ${APP_ORIGIN:?APP_ORIGIN is required}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      PLATFORM_ADMIN_USERNAME: ${PLATFORM_ADMIN_USERNAME:?PLATFORM_ADMIN_USERNAME is required}
      PLATFORM_ADMIN_DISPLAY_NAME: ${PLATFORM_ADMIN_DISPLAY_NAME:-平台管理员}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:?PLATFORM_ADMIN_PASSWORD is required}
      BOOTSTRAP_WORKSPACE_NAME: ${BOOTSTRAP_WORKSPACE_NAME:-CNC Factory}
      BOOTSTRAP_CUSTOMER_USERNAME: ${BOOTSTRAP_CUSTOMER_USERNAME:-}
      BOOTSTRAP_CUSTOMER_DISPLAY_NAME: ${BOOTSTRAP_CUSTOMER_DISPLAY_NAME:-}
      BOOTSTRAP_CUSTOMER_PASSWORD: ${BOOTSTRAP_CUSTOMER_PASSWORD:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-factory_session}
      ADMIN_SESSION_COOKIE_NAME: ${ADMIN_SESSION_COOKIE_NAME:-factory_admin_session}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      ORDER_DRAWING_STORAGE_DIR: /app/storage/order-drawings
    volumes:
      - factory-order-drawings-data:/app/storage/order-drawings
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_SITE_ADDRESS: ${APP_SITE_ADDRESS:?APP_SITE_ADDRESS is required}
    ports:
      - "${APP_HTTP_PORT:-18080}:80"
      - "${APP_HTTPS_PORT:-18443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - factory-caddy-data:/data
      - factory-caddy-config:/config
    depends_on:
      - web

volumes:
  factory-postgres-data:
    name: factory-system-postgres-data
  factory-order-drawings-data:
    name: factory-system-order-drawings-data
  factory-caddy-data:
    name: factory-system-caddy-data
  factory-caddy-config:
    name: factory-system-caddy-config
